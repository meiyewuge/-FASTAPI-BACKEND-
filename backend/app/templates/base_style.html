<style>
  @page { size: A4; margin: 18mm 14mm; }
  body { font-family: "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", sans-serif; color: #222; font-size: 12px; line-height: 1.65; }
  h1 { font-size: 26px; margin: 0 0 10px; }
  h2 { font-size: 18px; color: #0f766e; border-bottom: 1px solid #cbd5e1; padding-bottom: 6px; margin-top: 20px; }
  h3 { font-size: 14px; margin: 12px 0 6px; }
  .cover { background: #f0fdfa; padding: 18px; border-radius: 12px; margin-bottom: 18px; }
  .muted { color: #64748b; }
  .score { font-size: 42px; font-weight: 700; color: #0f766e; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #e0f2fe; color: #075985; margin: 2px; }
  .risk { background: #fee2e2; color: #991b1b; }
  .ok { background: #dcfce7; color: #166534; }

  th { background: #f8fafc; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .card { border: 1px solid #cbd5e1; border-radius: 10px; padding: 10px; background: #fff; margin-bottom: 10px; }
  .footer { margin-top: 24px; color: #64748b; font-size: 10px; border-top: 1px solid #e2e8f0; padding-top: 8px; }
