# 部署编排（skeleton）。前后端 + nginx 网关。
version: "3.9"
services:
  backend:
    build: ../backend
    env_file: ../backend/.env
    expose:
      - "8000"

  frontend:
    build: ../frontend
    expose:
      - "80"

  gateway:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend
