name: Build main backend image (private GHCR)

on:
  workflow_dispatch:
  push:
    branches:
      - agent/dm-daily-loop-c1b-r1b
    paths:
      - backend/**
      - .github/workflows/build-main-backend-ghcr.yml

permissions:
  contents: read
  packages: write

concurrency:
  group: main-backend-ghcr-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/fastapi-backend

jobs:
  build-publish:
    name: Build and publish linux/amd64 image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout audited branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to private GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:d3-staging
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=FASTAPI main backend
          cache-from: type=gha,scope=main-backend
          cache-to: type=gha,mode=max,scope=main-backend
          provenance: mode=max
          sbom: true

      - name: Pull by digest and verify import
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          docker pull "$IMAGE_REF"
          docker run --rm "$IMAGE_REF" python -c "import app.main; print('MAIN_BACKEND_IMPORT_OK')"

      - name: Record immutable deployment coordinates
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "## Private main-backend image"
            echo
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo "- Image: \`${IMAGE}\`"
            echo "- Digest: \`${DIGEST}\`"
            echo "- Deploy exactly: \`${IMAGE}@${DIGEST}\`"
            echo
            echo "No WeChat or DM runtime secret is used during this build."
          } >> "$GITHUB_STEP_SUMMARY"
